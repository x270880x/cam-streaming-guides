<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Streaming Guides</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#141420;color:#eeeeff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:440px}
h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px}
p{font-size:15px;color:#9090bb;line-height:1.6}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2878fc;margin-right:8px}
</style>
</head>
<body>
<div class="box">
  <h1><span class="dot"></span>Streaming Guides</h1>
  <p>Staging site — under construction.</p>
</div>
</body>
</html>
